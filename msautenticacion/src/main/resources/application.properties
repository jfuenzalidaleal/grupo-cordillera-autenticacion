# 1. ConexiÛn a PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=12345

# 2. ConfiguraciÛn de Hibernate (Crea las tablas autom·ticamente)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. ConfiguraciÛn del Token JWT (°Los valores que usan tus compaÒeros!)
app.jwt.secret=MiClaveSecretaSuperSeguraQueNadiePuedeAdivinarYEsMuyLarga123456
app.jwt.expiration-ms=86400000

# 4. Puerto del microservicio
server.port=8091

# Fuerza a Spring Security a imprimir TODO lo que hace en consola
logging.level.org.springframework.security=DEBUG
# Fuerza a Hibernate a mostrar las consultas SQL exactas que le hace a tu base de datos
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE